version: "3.9"
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: aeris-postgres
    environment:
      POSTGRES_DB: aeris_db
      POSTGRES_USER: aeris_user
      POSTGRES_PASSWORD: aeris_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aeris-backend
    environment:
      DATABASE_URL: postgresql://aeris_user:aeris_password@postgres:5432/aeris_db
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aeris-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
